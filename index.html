<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Dashboard</title>
  </head>
  <body>
    <header class="nav" id="nav">
      <p class="time">time</p>
      <p id="date">date</p>
    </header>
    <div class="name">
      <h1 id="editDash" contenteditable="true" class="name-container">RasmusFPS Dashboard</h1>
    </div>
    <section class="row">
      <div class="container">
        <h3>Links</h3>
        <div class="content" id="links">
        </div>
      </div>

      <div class="container">
        <h3>Weather</h3>
        <div class="content" id="weather">
          <div class="weather-card"></div>
        </div>
      </div>

      <div class="container">
        <h3>random API</h3>
        <div class="content" id="tbd">
          <h3>HELLO</h3>
        </div>
      </div>

      <div class="container">
        <h3>Notes</h3>
        <div class="content" >
          <textarea contenteditable="true" class="content" id="notes" placeholder="Write notes here..."></textarea>
        </div>
      </div>
    </section>
  </body>

  <script src="script.js"> </script>
</html>
