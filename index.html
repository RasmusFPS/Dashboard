<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Dashboard</title>
  </head>
  <body>
    <header class="nav" id="nav">
      <p class="time">time</p>
      <p id="date">date</p>
    </header>
    <div class="name">
      <h1 id="editDash" contenteditable="true" class="name-container">RasmusFPS Dashboard</h1>
    </div>
    <section class="row">
      <div class="container">
        <h3>Links</h3>
        <div class="content" id="links-list">
        </div>
        <button id="add-btn" class="add-btn">+ Add Link</button>
      </div>

      <div class="container">
        <h3>Weather</h3>
        <div class="content" id="weather">
          <div class="weather-card"></div>
        </div>
      </div>

      <div class="container">
        <h3>Pokemon</h3>
        <div class="content">
          <div class="pokemon-card">
            <div class="pokeball-cover"></div>
            <div id="Pokemon"></div>
          </div>
        </div>
      </div>

      <div class="container">
        <h3>Notes</h3>
        <div class="content" >
          <textarea contenteditable="true" class="content" id="notes" placeholder="Write notes here..."></textarea>
        </div>
      </div>
    </section>
    <div class="modal hidden" id="modal">
      <div class="modal-content">
        <h3>lägg till länk</h3>
        <input type="text" id="linkName" placeholder="shortcut name"/>
        <input 
          type="url" 
          name="" 
          id="linkurl"
          placeholder="https://Google.com"
          required/>
        <button class="save-btn" id="save-btn" type="button">Save</button>
        <button class="close-btn"id="close-btn" type="button">Close</button>
      </div>
    </div>
    <footer>
      <button class="bckg-button" id="bckg-button">Random background</button>
    </footer>
  </body>

  <script src="script.js"></script>
  <script src="Shortcut.js"></script>
</html>
